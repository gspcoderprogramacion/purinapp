<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Mascota</title>
</head>
<body>

  <h2>Registrar Mascota</h2>

  <form id="mascotaForm">
    <input type="text" id="nombre" placeholder="Nombre de la mascota" required />
    
    <select id="especie" required>
      <option value="">Seleccione especie</option>
      <option value="Perro">canino</option>
      <option value="Gato">felino</option>
      <option value="Ave">Ave</option>
      <option value="Otro">Otro</option>
    </select>

    <input type="number" id="edad" placeholder="Edad" min="0" required />

    <button type="submit">Registrar</button>
  </form>

  <script type="module" src="js/mascota.js"></script>
  <script type="module" src="js/authSesion.js"></script>
  <script type="module" src="js/authPermiso.js"></script>

</body>
</html>
